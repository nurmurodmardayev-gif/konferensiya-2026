<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Fayl Yuklash Vositasi</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ... (oldingi style to‘liq saqlangan, o‘zgartirish yo‘q) ... */
</style>
</head>
<body>
<!-- ... (header, body markup to‘liq saqlangan, hech nima o‘zgartirilmagan) ... -->

<script>
// ===== STATE =====
const state = {
  coll: null,
  certs: new Map(),
};
let fStr = '';

// ===== FILE LOADING =====
async function fileToB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ... (loadColl, loadFiles, renderFileList, removeFile, drag-drop, stats, table funksiyalari to‘liq saqlangan) ...

// ===== GENERATE =====
async function generate() {
  if (state.certs.size === 0) {
    toast('⚠️ Avval sertifikat fayllarini yuklang!', true); return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  showProgress(true);
  addLog('🔄 Tizim yaratilmoqda...');

  const entries = [];
  for (const [k, cert] of state.certs) {
    entries.push({
      name: cert.name,
      certFile: cert.fileName,
    });
  }

  setProgress(20);
  addLog('📋 ' + entries.length + ' ta ishtirokchi ma\'lumotlari tayyorlandi');

  addLog('🏗️ index.html yaratilmoqda...');
  const collFile = state.coll ? state.coll.name : null;
  const html = buildUserHTML(entries, collFile);
  setProgress(50);
  addLog('✅ index.html tayyor');

  addLog('📦 ZIP fayl yaratilmoqda...');
  setProgress(60);

  try {
    const zip = await buildZip(html, entries);
    setProgress(90);
    addLog('✅ ZIP fayl tayyor');
    downloadBlob(zip, 'konferensiya-tizim.zip');
    addLog('⬇️ ZIP yuklab olindi!');
  } catch(e) {
    addLog('⚠️ ZIP yaratilmadi, faqat index.html yuklanadi');
    downloadText(html, 'index.html');
    addLog('⬇️ index.html yuklab olindi');
  }

  setProgress(100);
  showResult(entries.length, !!state.coll);
  btn.disabled = false;
  toast('✅ Tizim muvaffaqiyatli yaratildi!');
}

// ===== BUILD USER HTML (TUZATILGAN QISM) =====
function buildUserHTML(entries, collFile) {
  const LOGO_DATA = 'data:image/png;base64,...'; // (oldingi logo bazasi saqlangan)

  const entriesJSON = JSON.stringify(entries);
  const collJSON = JSON.stringify(collFile);

  return `<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Konferensiya — Sertifikatlar</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ... (oldingi style to‘liq saqlangan) ... */
</style>
</head>
<body>
<!-- ... (header va hero qismi to‘liq saqlangan) ... -->

<div class="res-area" id="res"></div>

<script>
const ENTRIES=${entriesJSON};
const COLL=${collJSON};

// YANGI: Fayl nomlarini JS string uchun xavfsiz qilish
function escapeForJS(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/\\\\/g, '\\\\\\\\').replace(/'/g, "\\\\'");
}

// Tuzatilgan forceDownload (bitta parametr)
function forceDownload(filename) {
  const a = document.createElement('a');
  a.href = filename;
  a.download = filename.split('/').pop() || filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function norm(s){return s.toLowerCase().replace(/\\s+/g,' ').trim();}

function search(v){
  v=v.trim();
  const hint=document.getElementById('hint');
  const res=document.getElementById('res');
  if(v.length<2){hint.textContent='Kamida 2 ta harf kiriting';res.innerHTML='';return;}
  
  const found=ENTRIES.filter(e=>norm(e.name).includes(norm(v)));
  hint.textContent=found.length+' ta natija topildi';
  
  if(!found.length){res.innerHTML='<div class="nores">🔍 \''+v+'\' bo\'yicha hech narsa topilmadi</div>';return;}
  
  res.innerHTML=found.map(e=>`
    <div class="rcard">
      <div class="rname">\${e.name}</div>
      <div class="rmeta">KONFERENSIYA ISHTIROKCHISI · 2026</div>
      <div class="drow">
        \${e.certFile ? 
          \`<button class="dbtn cert" onclick="forceDownload('\${escapeForJS(e.certFile)}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Sertifikatni Yuklab Olish
          </button>\` : 
          '<span class="dbtn cert off">Sertifikat mavjud emas</span>'}
        \${COLL ? 
          \`<button class="dbtn coll" onclick="forceDownload('\${escapeForJS(COLL)}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Umumiy To'plamni Yuklab Olish
          </button>\` : ''}
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>`;
}

// Qolgan kod (buildZip, loadScript, UI helperlar) to‘liq saqlangan
// ... (oldingi scriptning qolgan qismi o‘zgartirilmagan)

</script>
</body>
</html>
